    L 110,45
    Z
  " fill="#2563eb" fill-opacity="0.15" stroke="#1d4ed8" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Star marker for Flower Mound area (north TX, near Dallas) -->
  <g transform="translate(268, 155)">
    <circle r="6" fill="#1d4ed8" opacity="0.9"/>
    <circle r="3" fill="white"/>
  </g>
  <!-- Dallas label -->
  <text x="282" y="148" font-family="monospace" font-size="10" fill="#1e40af" font-weight="600">Flower Mound</text>
  <!-- TX label -->
  <text x="210" y="255" font-family="Georgia, serif" font-size="52" fill="#1d4ed8" fill-opacity="0.12" font-weight="900" font-style="italic">TX</text>
  <!-- Compass rose -->
  <g transform="translate(450, 370)" opacity="0.4">
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#1d4ed8" stroke-width="1.2"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#1d4ed8" stroke-width="1.2"/>
    <text x="-3" y="-16" font-family="monospace" font-size="9" fill="#1d4ed8">N</text>
